<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tabela Futebol</title>

  <style>
    .leao {
        width: 100px;
        vertical-align: middle;
        margin-right: 0px;
    }

    .logo {
        width: 100px;
        vertical-align: middle;
        margin-left: 198px;
    }
    body {
      margin: 0;
      font-family: Arial;
      color: rgb(249, 249, 249);
      text-align: center;

      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
      url("https://wallpapers.com/images/hd/premier-league-lion-with-crown-xdd2popzj7bzrjt2.jpg");
      background-position:center;
      background-attachment: fixed;
    }

    h1 {
    margin-left: 10%;
    display: flex;
    margin-top: 10px;
    font-size: 50px;
    align-items:center;
    }




    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
      border-radius: 40px;
      overflow: hidden;
      font-size: 20px;

      background: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(1px);
    }

    th, td {
      padding: 20px;
    }

    th {
      background: #560d55;
    }

    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.245);
    }

    tr:nth-child(odd) {
      background: rgba(58, 58, 58, 0.645);
    }

    .top1 td:nth-child(2){ color: gold; font-weight: bold; }
    .top2 td:nth-child(2){ color: gold; font-weight: bold; }
    .top3 td:nth-child(2){ color: gold; font-weight: bold; }
    .top4 td:nth-child(2){ color: gold; font-weight: bold; }
    .top5 td:nth-child(2){ color: gold; font-weight: bold; }

/*Botões de Filtro */

.filtros{
        margin: 20px 0;
    }

    .filtros button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 20px;
        cursor: pointer;

        color: white;
        font-weight: bold;
        font-size: 14px;

        background: linear-gradient(135deg, #9333ea,#ec4899);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);

        transition: all 0.2s ease;
    }

    .filtros button:hover {
        transform: scale(1.05);
        background:  linear-gradient(135deg, #a855f7, #f472b6);
    }

    .filtros button:active{
        transform: scale(0.95);
    }

    .filtros button.ativo 
    {
        background: linear-gradient(135deg, #facc15, #f97316);
        color: black;
        box-shadow: 0 0 10px rgba(255,204,0,0.6);
    }

  </style>
</head>

<body>

<h1><img src="https://www.ogol.com.br/img/logos/competicoes/4_imgbank_pl_20250226175331.png" class="leao">
<span>Premier League</span>
<img src="https://raw.githubusercontent.com/JuanPablo34r7/ranking-futebol/main/Logo%20Doming%C3%A3o%20a%20Pra%C3%A7a%20e%20Nossa.png"
    class="logo">
</h1>

<div class="filtros">
    <button class="ativo" onclick="filtrarTipo('Todos')">Todos</button>
    <button onclick="filtrarTipo('Jogador')">Jogadores</button>
    <button onclick="filtrarTipo('Goleiro')">Goleiros</button>
</div>

<table>
  <thead>
    <tr>
      <th>N°</th>
      <th>Jogador</th>
      <th>V</th>
      <th>D</th>
      <th>E</th>
      <th>🔵</th>
      <th>🟡</th>
      <th>🔴</th>
      <th id="coluna-extra">⚽</th>
      <th>PTS</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>
const url = "https://opensheet.elk.sh/1ZV7VsXLnYkzs4QItWlF8s05NrRxOE-XEbbxOv9mu9o0/dadosPelada";

fetch(url)
  .then(res => res.json())
  .then(data => {

    // Ordenar por pontos e gols
    data.sort((a, b) => {
        if (b.Pontos !== a.Pontos) {
            return b.Pontos - a.Pontos; //Primeiro Filtro
        }
        return b.Gols - a.Gols; // Desempate

    });

    data = data.slice(0,30);

    const tabela = document.getElementById("tabela");

    data.forEach((player, index) => {
      let posicao = index +1;

      //Classe Cor
      let classe = "";
      if (index === 0) classe = "top1";
      if (index === 1) classe = "top2";
      if (index === 2) classe = "top3";
      if (index === 3) classe = "top4";
      if (index === 4) classe = "top5";

      //EMOJI

      let estrela = "";
      if (index < 5) estrela = "⭐."

      tabela.innerHTML += `
        <tr class="${classe}" data-tipo="${player.Tipo}" data-gols="${player.Gols}" data-defesa="${player.Defesas}">
          <td>${posicao}</td>
          <td>${estrela} ${player.Jogador}</td>
          <td>${player.Vitoria}</td>
          <td>${player.Derrota}</td>
          <td>${player.Empate}</td>
          <td>${player["C.AZ"]}</td>
          <td>${player["C.AM"]}</td>
          <td>${player["C.VM"]}</td>
          <td class="extra">${player.Gols}</td>
          <td>${player.Pontos}</td>
        </tr>
      `;
    });

  });

function filtrarTipo(tipo) {

  const linhas = document.querySelectorAll("#tabela tr");
  const titulo = document.getElementById("coluna-extra");

  linhas.forEach(linha => {

    const tipoJogador = linha.getAttribute("data-tipo");
    const coluna = linha.querySelector(".extra");

    if (
      tipo === "Todos" ||
      tipoJogador.toLowerCase().includes(tipo.toLowerCase())
    ) {
      linha.style.display = "";

      // 🔥 TROCA VALOR DA COLUNA
      if (tipo === "Goleiro") {
        titulo.innerText = "🧤";
        coluna.innerText = linha.getAttribute("data-defesa");
      } else {
        titulo.innerText = "⚽";
        coluna.innerText = linha.getAttribute("data-gols");
      }

    } else {
      linha.style.display = "none";
    }

  });
}

const botoes = document.querySelectorAll(".filtros button");

botoes.forEach(botao => {
  botao.addEventListener("click",() => {
    // Remove Ativo de todos
    botoes.forEach(b => b.classList.remove("ativo"));
    // Adiciona ativo no botão clicado
    botao.classList.add("ativo");
  });
})

</script>
