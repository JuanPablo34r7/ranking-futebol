<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tabela Futebol</title>
  <style>

    .mensagem-fixa {
    width: 60%;
    margin: 10px auto;
    padding: 10px 100px;
    background: linear-gradient(135deg, #2c0f4770,#631e4096);
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 50px;
    text-align: center;
    backdrop-filter: blur(5px);
    border: 1px linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5));
}
  
  
    .leao {
        width: 100px;
        vertical-align: middle;
        margin-right: 0px;
    }

    .logo {
        width: 100px;
        vertical-align: middle;
        margin-left: 198px;
    }
    body {
      margin: 0;
      font-family: Arial;
      color: rgb(249, 249, 249);
      text-align: center;

      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
      url("https://wallpapers.com/images/hd/premier-league-lion-with-crown-xdd2popzj7bzrjt2.jpg");
      background-position:center;
      background-attachment: fixed;
    }

    h1 {
    margin-left: 10%;
    display: flex;
    margin-top: 10px;
    font-size: 50px;
    align-items:center;
    }

    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
      border-radius: 40px;
      overflow: hidden;
      font-size: 20px;

      background: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(1px);
    }

    th, td {
      padding: 20px;
    }

    th {
      background: #560d55;
    }

    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.245);
    }

    tr:nth-child(odd) {
      background: rgba(58, 58, 58, 0.645);
    }

    .top1 td:nth-child(2){ color: gold; font-weight: bold; }
    .top2 td:nth-child(2){ color: gold; font-weight: bold; }
    .top3 td:nth-child(2){ color: gold; font-weight: bold; }
    .top4 td:nth-child(2){ color: gold; font-weight: bold; }
    .top5 td:nth-child(2){ color: gold; font-weight: bold; }

/*Botões de Filtro */

.filtros{
        margin: 20px 0;
    }

    .filtros button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 20px;
        cursor: pointer;

        color: rgb(255, 254, 254);
        font-weight: bold;
        font-size: 14px;

        background: linear-gradient(135deg, #9333ea,#ec4899);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);

        transition: all 0.2s ease;
    }

    .filtros button:hover {
        transform: scale(1.05);
        background:  linear-gradient(135deg, #a855f7, #f472b6);
    }

    .filtros button:active{
        transform: scale(0.95);
    }

    .filtros button.ativo 
    {
        background: linear-gradient(135deg, #facc15, #f97316);
        color: black;
        box-shadow: 0 0 10px rgba(255,204,0,0.6);
    }

  </style>
</head>

<body>

  <h1><img src="https://www.ogol.com.br/img/logos/competicoes/4_imgbank_pl_20250226175331.png" class="leao">
<span>Premier League</span>
<img src="https://raw.githubusercontent.com/JuanPablo34r7/ranking-futebol/main/Logo%20Doming%C3%A3o%20a%20Pra%C3%A7a%20e%20Nossa.png"
    class="logo">
</h1>

<div class="filtros">
    <button class="ativo" onclick="filtrarTipo('Todos')">Todos</button>
    <button onclick="filtrarTipo('Jogador')">Jogadores</button>
    <button onclick="filtrarTipo('Goleiro')">Goleiros
    </button>
</div>

<table>
  <thead>
<table>
  <thead>
    <tr>
      <th>N°</th>
      <th>Jogador</th>
      <th>V</th>
      <th>D</th>
      <th>E</th>
      <th>🔵</th>
      <th>🟡</th>
      <th>🔴</th>
      <th id="coluna-extra">⚽</th>
      <th>PTS</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<!-- MENSAGEM FIXA ACIMA DA TABELA -->
<div class="mensagem-fixa">
    ⭐ Melhores Jogadores | 🏆 Melhor Goleiro | 🔴 C.Vermelho | 🟡 C.Amarelo | 🔵 C.Azul | ⚽ Saldo de Gols
</div>

<script>
// Dados originais
let dadosOriginais = [];

const url = "https://opensheet.elk.sh/1ZV7VsXLnYkzs4QItWlF8s05NrRxOE-XEbbxOv9mu9o0/dadosPelada";

fetch(url)
  .then(res => res.json())
  .then(data => {
    dadosOriginais = data;
    carregarTabela("Todos");
  });

function carregarTabela(tipoSelecionado) {
  let dadosFiltrados = [...dadosOriginais];

  // ==================== FILTRAGEM ====================
  if (tipoSelecionado === "Jogador") {
    dadosFiltrados = dadosFiltrados.filter(p => p.Tipo && p.Tipo.toLowerCase().includes("jogador"));
  } else if (tipoSelecionado === "Goleiro") {
    dadosFiltrados = dadosFiltrados.filter(p => p.Tipo && p.Tipo.toLowerCase().includes("goleiro"));
  }

  // ==================== SOMAR QUANDO FOR "TODOS" ====================
  if (tipoSelecionado === "Todos") {
    const mapa = new Map();

    dadosFiltrados.forEach(player => {
      const nome = player.Jogador.trim().toUpperCase();

      if (!mapa.has(nome)) {
        mapa.set(nome, {
          Jogador: player.Jogador,
          Pontos: 0,
          Gols: 0,
          Vitoria: 0,
          Derrota: 0,
          Empate: 0,
          "C.AZ": 0,
          "C.AM": 0,
          "C.VM": 0,
        });
      }

      const atual = mapa.get(nome);
      atual.Pontos  += Number(player.Pontos)  || 0;
      atual.Gols    += Number(player.Gols)    || 0;
      atual.Vitoria += Number(player.Vitoria) || 0;
      atual.Derrota += Number(player.Derrota) || 0;
      atual.Empate  += Number(player.Empate)  || 0;
      atual["C.AZ"] += Number(player["C.AZ"]) || 0;
      atual["C.AM"] += Number(player["C.AM"]) || 0;
      atual["C.VM"] += Number(player["C.VM"]) || 0;
    });

    dadosFiltrados = Array.from(mapa.values());
  }

  // ==================== ORDENAÇÃO ====================
  dadosFiltrados.sort((a, b) => {
    const ptsA = Number(a.Pontos) || 0;
    const ptsB = Number(b.Pontos) || 0;
    const golsA = Number(a.Gols) || 0;
    const golsB = Number(b.Gols) || 0;

    if (ptsA !== ptsB) return ptsB - ptsA;
    return golsB - golsA;
  });

  dadosFiltrados = dadosFiltrados.slice(0, 30);

  // Monta tabela
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  const thead = document.querySelector("thead tr");
  thead.innerHTML = "";

  if (tipoSelecionado === "Goleiro") {
    thead.innerHTML = `<th>N°</th><th>Goleiro</th><th>V</th><th>D</th><th>E</th><th>🔵</th><th>🟡</th><th>🔴</th><th>PTS</th>`;
  } else {
    thead.innerHTML = `<th>N°</th><th>Jogador</th><th>V</th><th>D</th><th>E</th><th>🔵</th><th>🟡</th><th>🔴</th><th>⚽</th><th>PTS</th>`;
  }

  // Preenche as linhas
  dadosFiltrados.forEach((player, index) => {
    let posicao = index + 1;
    let classe = "";
    let estrela = "";

    if (tipoSelecionado === "Goleiro") {
      // Apenas o melhor goleiro recebe troféu
      if (index === 0) {
        classe = "top1";
        estrela = "🏆 ";
      }
    } else {
      // Top 5 para Jogadores e Todos
      if (index === 0) classe = "top1";
      if (index === 1) classe = "top2";
      if (index === 2) classe = "top3";
      if (index === 3) classe = "top4";
      if (index === 4) classe = "top5";
      estrela = index < 5 ? "⭐ " : "";
    }

    let htmlLinha = `
      <tr class="${classe}">
        <td>${posicao}</td>
        <td>${estrela}${player.Jogador}</td>
        <td>${player.Vitoria || 0}</td>
        <td>${player.Derrota || 0}</td>
        <td>${player.Empate || 0}</td>
        <td>${player["C.AZ"] || 0}</td>
        <td>${player["C.AM"] || 0}</td>
        <td>${player["C.VM"] || 0}</td>
    `;

    if (tipoSelecionado !== "Goleiro") {
      htmlLinha += `<td>${player.Gols || 0}</td>`;
    }

    htmlLinha += `<td>${player.Pontos || 0}</td></tr>`;

    tabela.innerHTML += htmlLinha;
  });
}

function filtrarTipo(tipo) {
  carregarTabela(tipo);
}

// Ativar botão
document.querySelectorAll(".filtros button").forEach(botao => {
  botao.addEventListener("click", () => {
    document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("ativo"));
    botao.classList.add("ativo");
  });
});
</script>
