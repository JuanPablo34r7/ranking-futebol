<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tabela Futebol</title>

  <style>

    .leao {
        width: 100px;
        vertical-align: middle;
        margin-right: 0px;
    }

    .logo {
        width: 100px;
        vertical-align: middle;
        margin-left: 300px;
    }
    body {
      font-family: Arial;
      color: white;
      text-align: center;

      background: url("https://wallpapers.com/images/hd/premier-league-lion-with-crown-xdd2popzj7bzrjt2.jpg");
      background-size: cover;
      background-position: center;
    }

    h1 {
    margin-left: 8%;
    display: flex;
    margin-top: 10px;
    font-size: 30px;
    align-items: center;
    }

    table {
      border-collapse: collapse;
      width: 60%;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
      font-size: 15px;

      background: rgba(2, 6, 23, 0.6);
      backdrop-filter: blur(1px);
    }

    th, td {
      padding: 20px;
    }

    th {
      background: #a302bf;
    }

    tr:nth-child(even) {
      background: rgba(84, 84, 84, 0.3);
    }

    tr:nth-child(odd) {
      background: rgba(216, 216, 216, 0.3);
    }

    .top1 td:nth-child(2){ color: gold; font-weight: bold; }
    .top2 td:nth-child(2){ color: gold; font-weight: bold; }
    .top3 td:nth-child(2){ color: gold; font-weight: bold; }
    .top4 td:nth-child(2){ color: gold; font-weight: bold; }
    .top5 td:nth-child(2){ color: gold; font-weight: bold; }
  </style>
</head>

<body>

<h1><img src="https://www.ogol.com.br/img/logos/competicoes/4_imgbank_pl_20250226175331.png" class="leao">
    <Span>Premier League</Span>
    <img src="https://raw.githubusercontent.com/JuanPablo34r7/ranking-futebol/main/Logo%20Doming%C3%A3o%20a%20Pra%C3%A7a%20e%20Nossa.png"
    class="logo">
</h1>

<table>
  <thead>
    <tr>
      <th>N°</th>
      <th>Jogador</th>
      <th>V</th>
      <th>D</th>
      <th>E</th>
      <th>🔵</th>
      <th>🟡</th>
      <th>🔴</th>
      <th>⚽</th>
      <th>PTS</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>
const url = "https://opensheet.elk.sh/1ZV7VsXLnYkzs4QItWlF8s05NrRxOE-XEbbxOv9mu9o0/dadosPelada";

fetch(url)
  .then(res => res.json())
  .then(data => {

    // Ordenar por pontos e gols
    data.sort((a, b) => {
        if (b.Pontos !== a.Pontos) {
            return b.Pontos - a.Pontos; //Primeiro Filtro
        }
        return b.Gols - a.Gols; // Desempate

    });

    data = data.slice(0,30);

    const tabela = document.getElementById("tabela");

    data.forEach((player, index) => {
      let posicao = index +1;

      //Classe Cor
      let classe = "";
      if (index === 0) classe = "top1";
      if (index === 1) classe = "top2";
      if (index === 2) classe = "top3";
      if (index === 3) classe = "top4";
      if (index === 4) classe = "top5";

      //EMOJI

      let estrela = "";
      if (index < 5) estrela = "⭐."

      tabela.innerHTML += `
        <tr class="${classe}">
          <td>${posicao}</td>
          <td>${estrela} ${player.Jogador}</td>
          <td>${player.Vitoria}</td>
          <td>${player.Derrota}</td>
          <td>${player.Empate}</td>
          <td>${player["C.AZ"]}</td>
          <td>${player["C.AM"]}</td>
          <td>${player["C.VM"]}</td>
          <td>${player.Gols}</td>
          <td>${player.Pontos}</td>
        </tr>
      `;
    });

  });
</script>
